<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>HORASOCIAL PRO - Bienvenido</title>
<!-- Google Fonts: Plus Jakarta Sans & Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ===== ANIMATED WAVE BACKGROUND ===== */
  body {
    background: #0b1a3b; /* deep navy base */
    position: relative;
  }

  /* Wave layer 1 – top */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 120% 60% at 20% 10%,  #38bdf8cc 0%, transparent 60%),
      radial-gradient(ellipse 100% 50% at 80% 80%,  #0ea5e9aa 0%, transparent 60%),
      radial-gradient(ellipse 80%  40% at 50% 50%,  #7dd3fc66 0%, transparent 70%);
    animation: waveTop 12s ease-in-out infinite alternate;
    pointer-events: none;
  }

  /* Wave layer 2 – bottom */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 110% 55% at 70% 0%,   #bae6fd88 0%, transparent 55%),
      radial-gradient(ellipse 90%  45% at 10% 90%,  #0284c7aa 0%, transparent 60%),
      radial-gradient(ellipse 100% 50% at 50% 100%, #38bdf8cc 0%, transparent 50%);
    animation: waveBottom 16s ease-in-out infinite alternate-reverse;
    pointer-events: none;
  }

  @keyframes waveTop {
    0%   { transform: scale(1)    translateY(0%)   rotate(0deg); }
    50%  { transform: scale(1.05) translateY(-4%)  rotate(1.5deg); }
    100% { transform: scale(1)    translateY(2%)   rotate(-1deg); }
  }

  @keyframes waveBottom {
    0%   { transform: scale(1)    translateY(0%)  rotate(0deg); }
    50%  { transform: scale(1.06) translateY(4%)  rotate(-2deg); }
    100% { transform: scale(1)    translateY(-2%) rotate(1deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    body::before, body::after { animation: none; }
  }

  /* ===== LAYOUT ===== */
  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 28px;
    padding: 32px 20px;
  }

  /* ===== LOGO CONTAINER ===== */
  .logo-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    /* glassmorphism */
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 18px;
    /* thin black outer border */
    border: 2px solid #000000;
    /* soft glow */
    box-shadow:
      0 0 0 4px rgba(14, 165, 233, 0.4),
      0 8px 32px rgba(0, 0, 0, 0.35);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }

  .logo-wrapper:hover {
    transform: scale(1.03);
    box-shadow:
      0 0 0 5px rgba(56, 189, 248, 0.6),
      0 12px 40px rgba(0, 0, 0, 0.4);
  }

  .logo-wrapper img {
    width: clamp(220px, 40vw, 340px);
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* ===== TYPOGRAPHY ===== */
  .tagline {
    text-align: center;
    max-width: 380px;
  }

  .tagline h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    color: #ffffff;
    line-height: 1.25;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .tagline h1 span {
    color: #38bdf8; /* sky blue / celeste */
  }

  .tagline p {
    margin-top: 10px;
    font-size: clamp(14px, 3vw, 16px);
    color: rgba(255,255,255,0.78);
    line-height: 1.6;
  }

  /* ===== BUTTON ===== */
  .btn-siguiente {
    width: 100%;
    max-width: 380px;
    padding: 14px 32px;
    background: #0a0f2c;
    color: #ffffff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  .btn-siguiente:hover {
    background: #141e55;
    transform: scale(1.03);
    box-shadow: 0 6px 28px rgba(0,0,0,0.5);
  }

  .btn-siguiente:active {
    transform: scale(0.97);
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    font-size: 20px;
  }

  /* ===== FOOTER ===== */
  .copyright {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
    text-align: center;
  }

  /* ===== FLOATING WATERMARKS ===== */
  .floating-icon {
    position: fixed;
    font-size: 120px;
    color: rgba(255,255,255,0.04);
    user-select: none;
    pointer-events: none;
    font-family: 'Material Symbols Outlined';
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
  }
</style>
</head>

<body>

  <!-- Floating watermark icons -->
  <span class="floating-icon" style="top:8%; left:4%">settings</span>
  <span class="floating-icon" style="bottom:6%; right:4%">school</span>
  <span class="floating-icon" style="top:30%; right:2%; font-size:80px;">history_edu</span>
  <span class="floating-icon" style="bottom:25%; left:2%; font-size:80px;">assignment_turned_in</span>

  <main>

    <!-- LOGO -->
    <div class="logo-wrapper">
      <img
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwMhl_DdmeafGOmiL2QLqeQV_Ut8aNvKKYwKjKUtrAMBSjpyGc1Acc5TCQm084EODuuIAA3GiusiDfLdXgW3DAC8tdYPa8R-TEraz_hHglTpuTQJRtfOJfW_OyF25795_lzWR3g1wKtd_0fCPC6QxHfyblbvKAQVJNcggVB3k8TYcOAOsA0lTgC8lQz0E1YRlDIn1zQ0vALf8l_40TC_X6xkuWE-o1qr0sdsv2THdAcTxAM9txnjL8N_7oSnlqsHLnXkvvL7tImO-s"
        alt="HORASOCIAL PRO Logo"
      >
    </div>

    <!-- SLOGAN -->
    <div class="tagline">
      <h1>Formando tu futuro,<br><span>una hora a la vez.</span></h1>
      <p>La gestión inteligente de tu servicio social escolar comienza aquí.</p>
    </div>

    <!-- BUTTON -->
    <button class="btn-siguiente" onclick="handleNavigation()" id="btn-siguiente">
      <span>Siguiente</span>
      <span class="material-symbols-outlined">arrow_forward</span>
    </button>

    <!-- COPYRIGHT -->
    <p class="copyright">© 2026 HORASOCIAL PRO</p>

  </main>

  <script>
    function handleNavigation() {
      const btn = document.getElementById('btn-siguiente');
      btn.innerHTML = '<span class="material-symbols-outlined" style="animation:spin 0.8s linear infinite">progress_activity</span>';
      btn.disabled = true;
      setTimeout(() => {
        console.log("Navigating to next screen...");
      }, 800);
    }

    // Parallax watermarks on desktop
    if (window.innerWidth > 768) {
      document.addEventListener('mousemove', (e) => {
        const icons = document.querySelectorAll('.floating-icon');
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        icons.forEach((icon, i) => {
          const s = (i + 1) * 8;
          icon.style.transform = `translate(${(x - 0.5) * s}px, ${(y - 0.5) * s}px)`;
        });
      });
    }
  </script>
</body>
</html>
