<style>

        /* Fluid wave background */
        body::before {

<script>
        function handleNavigation() {
            // Simple visual feedback before navigation intent
            const btn = document.querySelector('button');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                console.log("Navigating to next screen...");
                // In a real app, this would be window.location.href or a router push
            }, 800);
        }

        // Add a parallax-like effect to watermarks on mouse move (Desktop Only)
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const icons = document.querySelectorAll('.floating-icon');
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                icons.forEach((icon, index) => {
                    const speed = (index + 1) * 10;
                    const xOffset = (x - 0.5) * speed;
                    const yOffset = (y - 0.5) * speed;
                    icon.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
                });
            });
        }
    </script>
