<style>

            position: relative;
        }

        .floating-icon {
            position: absolute;
            opacity: 0.03;
            user-select: none;
            pointer-events: none;
        }

        .btn-glow:active {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* === ANIMATED WAVES === */
        .waves-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .wave-svg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        .wave1 {
            bottom: 0;
            opacity: 0.18;
            animation: waveMove 10s linear infinite;
        }
        .wave2 {
            bottom: 20px;
            opacity: 0.12;
            animation: waveMove 14s linear infinite reverse;
        }
        .wave3 {
            bottom: 40px;
            opacity: 0.08;
            animation: waveMove 18s linear infinite;
        }
        .wave4 {
            bottom: 60px;
            opacity: 0.06;
            animation: waveMove 22s linear infinite reverse;
        }

        @keyframes waveMove {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Ensure main content sits above waves */
        main {
            position: relative;
            z-index: 1;
        }
    </style>

<script>
        function handleNavigation() {
            // Simple visual feedback before navigation intent
            const btn = document.querySelector('button');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                console.log("Navigating to next screen...");
                // In a real app, this would be window.location.href or a router push
            }, 800);
        }

        // Add a parallax-like effect to watermarks on mouse move (Desktop Only)
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const icons = document.querySelectorAll('.floating-icon');
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                icons.forEach((icon, index) => {
                    const speed = (index + 1) * 10;
                    const xOffset = (x - 0.5) * speed;
                    const yOffset = (y - 0.5) * speed;
                    icon.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
                });
            });
        }
    </script>
