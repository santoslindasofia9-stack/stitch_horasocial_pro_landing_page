<!-- ===== WAVE ANIMATION SCRIPT ===== -->
<script>
    // ---- Canvas Wave Engine ----
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Wave definitions
    const waves = [
        { amplitude: 38, period: 0.012, speed: 0.018, yBase: 0.72, color: 'rgba(56,189,248,0.22)',  phase: 0 },
        { amplitude: 28, period: 0.010, speed: 0.013, yBase: 0.76, color: 'rgba(14,165,233,0.18)',  phase: 1.8 },
        { amplitude: 48, period: 0.008, speed: 0.009, yBase: 0.80, color: 'rgba(125,211,252,0.14)', phase: 3.5 },
        { amplitude: 22, period: 0.015, speed: 0.022, yBase: 0.84, color: 'rgba(186,230,253,0.20)', phase: 5.2 },
        { amplitude: 55, period: 0.006, speed: 0.006, yBase: 0.88, color: 'rgba(56,189,248,0.10)',  phase: 0.9 },
    ];

    let tick = 0;

    function drawWave(wave) {
        const W = canvas.width;
        const H = canvas.height;
        const baseY = H * wave.yBase;

        ctx.beginPath();
        ctx.moveTo(0, H);

        for (let x = 0; x <= W; x += 2) {
            const y = baseY
                + Math.sin(x * wave.period + wave.phase + tick * wave.speed) * wave.amplitude
                + Math.sin(x * wave.period * 1.7 + wave.phase * 1.3 + tick * wave.speed * 0.6) * (wave.amplitude * 0.4);
            ctx.lineTo(x, y);
        }

        ctx.lineTo(W, H);
        ctx.closePath();
        ctx.fillStyle = wave.color;
        ctx.fill();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        waves.forEach(w => drawWave(w));
        tick++;
        requestAnimationFrame(animate);
    }

    animate();

    // ---- Navigation Handler ----
    function handleNavigation() {
        const btn = document.querySelector('button');
        btn.innerHTML = '<span class="material-symbols-outlined" style="animation:spin 0.8s linear infinite; display:inline-block;">progress_activity</span>';
        setTimeout(() => {
            console.log("Navigating to next screen...");
        }, 800);
    }

    // ---- Parallax watermarks (Desktop only) ----
    if (window.innerWidth > 768) {
        document.addEventListener('mousemove', (e) => {
            const icons = document.querySelectorAll('.floating-icon');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            icons.forEach((icon, index) => {
                const speed = (index + 1) * 10;
                icon.style.transform = `translate(${(x - 0.5) * speed}px, ${(y - 0.5) * speed}px)`;
            });
        });
    }

    // Spin animation for loader
    const style = document.createElement('style');
    style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(style);
</script>
