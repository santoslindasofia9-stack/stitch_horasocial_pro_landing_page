<!-- ===== ELEGANT WAVE ANIMATION ===== -->
<script>
(function() {
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    /*
     * Each wave is a THIN, flowing line (stroke) — not a filled block.
     * They're distributed across the full height of the screen
     * with varying curvatures and speeds for an organic feel.
     */
    const wavelines = [
        // Top area — very subtle
        { y: 0.10, amp: 18, freq: 0.003, speed: 0.008, width: 1.2, color: 'rgba(56,189,248,0.10)', phase: 0 },
        { y: 0.15, amp: 22, freq: 0.0025, speed: 0.006, width: 1.5, color: 'rgba(14,165,233,0.08)', phase: 2.1 },

        // Upper-mid
        { y: 0.28, amp: 25, freq: 0.0035, speed: 0.010, width: 1.8, color: 'rgba(56,189,248,0.12)', phase: 1.0 },
        { y: 0.33, amp: 15, freq: 0.004,  speed: 0.007, width: 1.0, color: 'rgba(125,211,252,0.09)', phase: 3.8 },

        // Middle
        { y: 0.48, amp: 30, freq: 0.002,  speed: 0.005, width: 2.0, color: 'rgba(14,165,233,0.11)', phase: 0.5 },
        { y: 0.53, amp: 20, freq: 0.003,  speed: 0.012, width: 1.4, color: 'rgba(56,189,248,0.08)', phase: 4.2 },

        // Lower-mid
        { y: 0.66, amp: 28, freq: 0.0028, speed: 0.009, width: 2.2, color: 'rgba(125,211,252,0.13)', phase: 1.7 },
        { y: 0.72, amp: 18, freq: 0.0038, speed: 0.011, width: 1.3, color: 'rgba(14,165,233,0.07)', phase: 5.5 },

        // Bottom area — slightly more visible
        { y: 0.84, amp: 35, freq: 0.002,  speed: 0.007, width: 2.5, color: 'rgba(56,189,248,0.14)', phase: 2.8 },
        { y: 0.90, amp: 22, freq: 0.003,  speed: 0.014, width: 1.6, color: 'rgba(186,230,253,0.12)', phase: 0.3 },
        { y: 0.95, amp: 15, freq: 0.004,  speed: 0.009, width: 1.2, color: 'rgba(14,165,233,0.10)', phase: 4.7 },
    ];

    let t = 0;

    function drawLine(wl) {
        const baseY = H * wl.y;
        ctx.beginPath();

        for (let x = -10; x <= W + 10; x += 3) {
            const y = baseY
                + Math.sin(x * wl.freq + wl.phase + t * wl.speed) * wl.amp
                + Math.sin(x * wl.freq * 2.3 + wl.phase * 0.7 + t * wl.speed * 0.4) * (wl.amp * 0.25)
                + Math.cos(x * wl.freq * 0.5 + t * wl.speed * 1.3) * (wl.amp * 0.15);

            if (x === -10) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }

        ctx.strokeStyle = wl.color;
        ctx.lineWidth = wl.width;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
    }

    function render() {
        ctx.clearRect(0, 0, W, H);
        wavelines.forEach(wl => drawLine(wl));
        t += 1;
        requestAnimationFrame(render);
    }

    render();
})();

// ---- Navigation Handler ----
function handleNavigation() {
    const btn = document.querySelector('button');
    btn.innerHTML = '<span class="material-symbols-outlined" style="animation:spin 0.8s linear infinite; display:inline-block;">progress_activity</span>';
    setTimeout(() => {
        console.log("Navigating to next screen...");
    }, 800);
}

// ---- Parallax watermarks (Desktop) ----
if (window.innerWidth > 768) {
    document.addEventListener('mousemove', (e) => {
        const icons = document.querySelectorAll('.floating-icon');
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        icons.forEach((icon, i) => {
            const s = (i + 1) * 8;
            icon.style.transform = `translate(${(x - 0.5) * s}px, ${(y - 0.5) * s}px)`;
        });
    });
}
