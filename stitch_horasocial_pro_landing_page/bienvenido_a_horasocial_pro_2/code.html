<!DOCTYPE html><html class="light" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>HORASOCIAL PRO - Bienvenido</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
    }

    body {
        background: #fafbfc;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #191c1e;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }



    /* ============================================
       MAIN CONTENT
       ============================================ */
    .content-wrapper {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        padding: 40px 24px 0;
        gap: 20px;
        padding-bottom: 40px;
    }

    /* ---- Logo Block ---- */
    .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        animation: floatLogo 6s ease-in-out infinite;
    }

    @keyframes floatLogo {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-8px); }
    }

    .logo-frame {
        position: relative;
        display: inline-block;
        padding: 4px;
        border-radius: 20px;
        background: linear-gradient(135deg, #0c2340 0%, #0ea5e9 50%, #0c2340 100%);
        background-size: 200% 200%;
        animation: borderShimmer 6s ease-in-out infinite;
        box-shadow:
            0 4px 24px rgba(12, 35, 64, 0.15),
            0 1px 4px rgba(14, 165, 233, 0.10);
    }

    @keyframes borderShimmer {
        0%, 100% { background-position: 0% 50%; }
        50%      { background-position: 100% 50%; }
    }

    .logo-frame img {
        display: block;
        width: 320px;
        max-width: 75vw;
        height: auto;
        border-radius: 16px;
        background: #ffffff;
    }

    /* ---- Text Block (compact, unified) ---- */
    .text-block {
        text-align: center;
        max-width: 380px;
    }

    .text-block h1 {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 26px;
        font-weight: 700;
        color: #0c2340;
        line-height: 1.25;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
    }

    .text-block h1 span {
        color: #006591;
    }

    .text-block p {
        font-size: 15px;
        color: #5a6370;
        line-height: 1.55;
        max-width: 300px;
        margin: 0 auto;
    }

    /* ---- Button ---- */
    .btn-next {
        width: 100%;
        max-width: 340px;
        padding: 15px 32px;
        background: #0c2340;
        color: #ffffff;
        border: none;
        border-radius: 14px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s cubic-bezier(.4,0,.2,1);
        box-shadow: 0 4px 18px rgba(12, 35, 64, 0.20);
        margin-top: 4px;
    }

    .btn-next:hover {
        transform: scale(1.02);
        box-shadow: 0 6px 28px rgba(12, 35, 64, 0.30);
    }

    .btn-next:active {
        transform: scale(0.97);
        box-shadow: 0 2px 10px rgba(14, 165, 233, 0.35);
    }

    /* ---- Footer ---- */
    .footer-info {
        text-align: center;
        margin-top: 6px;
    }

    .footer-info span {
        font-size: 11px;
        font-weight: 600;
        color: #9ca3af;
        letter-spacing: 0.04em;
    }

    .footer-line {
        width: 40px;
        height: 3px;
        background: #d1d5db;
        border-radius: 9999px;
        margin: 5px auto 0;
        opacity: 0.5;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Responsive ---- */
    @media (min-height: 740px) {
        .content-wrapper { gap: 26px; }
        .text-block h1 { font-size: 30px; }
        .logo-frame img { width: 360px; }
    }

    @media (max-height: 640px) {
        .content-wrapper { gap: 12px; padding-top: 20px; }
        .text-block h1 { font-size: 22px; }
        .text-block p { font-size: 13px; }
        .logo-frame img { width: 240px; }
        .btn-next { padding: 12px 24px; font-size: 16px; }
    }
</style>
</head>
<body>

<!-- ============================================
     WAVE ZÓCALO (Bottom 20%)
     4 layered SVG waves: navy base + cyan overlays
     ============================================ -->


<!-- ============================================
     MAIN CONTENT — Upper 80%
     ============================================ -->
<div class="content-wrapper">

    <!-- Logo -->
    <div class="logo-container">
        <div class="logo-frame">
            <img
                alt="HORASOCIAL PRO — Gestión de Servicio Social Escolar"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwMhl_DdmeafGOmiL2QLqeQV_Ut8aNvKKYwKjKUtrAMBSjpyGc1Acc5TCQm084EODuuIAA3GiusiDfLdXgW3DAC8tdYPa8R-TEraz_hHglTpuTQJRtfOJfW_OyF25795_lzWR3g1wKtd_0fCPC6QxHfyblbvKAQVJNcggVB3k8TYcOAOsA0lTgC8lQz0E1YRlDIn1zQ0vALf8l_40TC_X6xkuWE-o1qr0sdsv2THdAcTxAM9txnjL8N_7oSnlqsHLnXkvvL7tImO-s"
            >
        </div>
    </div>

    <!-- Text Block -->
    <div class="text-block">
        <h1>
            Formando tu futuro,<br>
            <span>una hora a la vez.</span>
        </h1>
        <p>La gestión inteligente de tu servicio social escolar comienza aquí.</p>
    </div>

    <!-- Action Button -->
    <button class="btn-next" id="btn-siguiente" onclick="handleNavigation()">
        <span>Siguiente</span>
        <span class="material-symbols-outlined" style="font-size:20px;">arrow_forward</span>
    </button>

    <!-- Footer -->
    <div class="footer-info">
        <span>© 2026 HORASOCIAL PRO</span>
        <div class="footer-line"></div>
    </div>
</div>

<script>
    function handleNavigation() {
        const btn = document.getElementById('btn-siguiente');
        btn.innerHTML = '<span class="material-symbols-outlined" style="animation:spin 0.8s linear infinite; display:inline-block; font-size:22px;">progress_activity</span>';
        setTimeout(() => {
            console.log("Navigating to next screen...");
        }, 800);
    }
</script>
</body></html>
