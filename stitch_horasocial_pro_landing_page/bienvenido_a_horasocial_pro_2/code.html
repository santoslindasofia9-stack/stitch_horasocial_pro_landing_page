<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
    }

    body {
        background: #f7f9fb;
        min-height: 100vh;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
    }

    /* ===== AMBIENT LIGHT ORBS ===== */
    .ambient-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
    }

    .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        will-change: transform;
    }

    /* Orb 1 — Large, top-left, soft sky blue */
    .orb-1 {
        width: 420px;
        height: 420px;
        top: -8%;
        left: -5%;
        background: radial-gradient(circle, rgba(56,189,248,0.18) 0%, rgba(56,189,248,0) 70%);
        animation: drift1 20s ease-in-out infinite;
    }

    /* Orb 2 — Medium, top-right, light teal */
    .orb-2 {
        width: 320px;
        height: 320px;
        top: 5%;
        right: -8%;
        background: radial-gradient(circle, rgba(14,165,233,0.14) 0%, rgba(14,165,233,0) 70%);
        animation: drift2 25s ease-in-out infinite;
    }

    /* Orb 3 — Large, center, very soft lavender-blue */
    .orb-3 {
        width: 500px;
        height: 500px;
        top: 30%;
        left: 25%;
        background: radial-gradient(circle, rgba(125,211,252,0.12) 0%, rgba(186,230,253,0) 70%);
        animation: drift3 30s ease-in-out infinite;
    }

    /* Orb 4 — Medium, bottom-left, cyan accent */
    .orb-4 {
        width: 350px;
        height: 350px;
        bottom: -5%;
        left: -10%;
        background: radial-gradient(circle, rgba(6,182,212,0.13) 0%, rgba(6,182,212,0) 70%);
        animation: drift4 22s ease-in-out infinite;
    }

    /* Orb 5 — Small, bottom-right, soft blue */
    .orb-5 {
        width: 280px;
        height: 280px;
        bottom: 10%;
        right: 5%;
        background: radial-gradient(circle, rgba(56,189,248,0.10) 0%, rgba(56,189,248,0) 70%);
        animation: drift5 18s ease-in-out infinite;
    }

    /* Orb 6 — Tiny accent, center-top */
    .orb-6 {
        width: 200px;
        height: 200px;
        top: 15%;
        left: 50%;
        background: radial-gradient(circle, rgba(186,230,253,0.15) 0%, rgba(186,230,253,0) 70%);
        animation: drift6 24s ease-in-out infinite;
    }

    /* --- Slow, organic drift keyframes --- */
    @keyframes drift1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25%      { transform: translate(40px, 30px) scale(1.05); }
        50%      { transform: translate(20px, 60px) scale(0.97); }
        75%      { transform: translate(-20px, 25px) scale(1.03); }
    }

    @keyframes drift2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25%      { transform: translate(-35px, 40px) scale(1.04); }
        50%      { transform: translate(-50px, 15px) scale(0.96); }
        75%      { transform: translate(-15px, -20px) scale(1.02); }
    }

    @keyframes drift3 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        20%      { transform: translate(30px, -25px) scale(1.06); }
        40%      { transform: translate(-20px, -40px) scale(0.95); }
        60%      { transform: translate(-40px, 15px) scale(1.03); }
        80%      { transform: translate(15px, 30px) scale(0.98); }
    }

    @keyframes drift4 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        30%      { transform: translate(50px, -30px) scale(1.05); }
        60%      { transform: translate(25px, -50px) scale(0.97); }
        80%      { transform: translate(-10px, -20px) scale(1.02); }
    }

    @keyframes drift5 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25%      { transform: translate(-30px, -25px) scale(1.06); }
        50%      { transform: translate(-15px, 20px) scale(0.95); }
        75%      { transform: translate(20px, 10px) scale(1.03); }
    }

    @keyframes drift6 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33%      { transform: translate(-25px, 35px) scale(1.08); }
        66%      { transform: translate(30px, -15px) scale(0.94); }
    }

    /* ===== CONTENT ===== */
    main {
        position: relative;
        z-index: 2;
    }

    @keyframes float {
        0%   { transform: translateY(0); }
        50%  { transform: translateY(-10px); }
        100% { transform: translateY(0); }
    }

    .animate-float {
        animation: float 6s ease-in-out infinite;
    }

    .btn-primary {
        padding: 16px 32px;
        background: #131b2e;
        color: #ffffff;
        border-radius: 16px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 20px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: none;
        cursor: pointer;
        width: 100%;
        transition: transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s cubic-bezier(.4,0,.2,1);
        box-shadow: 0 4px 20px rgba(19,27,46,0.18);
    }

    .btn-primary:hover {
        transform: scale(1.02);
        box-shadow: 0 8px 32px rgba(19,27,46,0.28);
    }

    .btn-primary:active {
        transform: scale(0.98);
        box-shadow: 0 2px 12px rgba(56,189,248,0.4);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
