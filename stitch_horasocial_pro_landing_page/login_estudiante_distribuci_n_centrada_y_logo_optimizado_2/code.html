<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HORASOCIAL PRO - Iniciar Sesión Estudiante</title>
    
    <!-- Fuentes e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* === RESET Y GLOBALES === */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #fafbfc;
            font-family: 'Inter', sans-serif;
            color: #191c1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }

        /* === CONTENEDOR DE LA TARJETA (LOGIN) === */
        .login-card {
            position: relative;
            z-index: 2;
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            margin: auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* === LOGO === */
        .card-logo {
            width: 100%;
            max-width: 180px;
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }
        .card-logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        /* === TÍTULO === */
        .card-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 22px;
            color: #191c1e;
            text-align: center;
            font-weight: 700;
        }
        .card-title span {
            color: #39b8fd;
        }

        /* === FORMULARIO === */
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Contenedor de inputs */
        .input-group {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #9ca3af;
            font-size: 20px;
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            height: 52px;
            padding: 0 16px 0 48px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            background-color: #ffffff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field::placeholder {
            color: #9ca3af;
        }

        .input-field:focus {
            border-color: #39b8fd;
            box-shadow: 0 0 0 4px rgba(57, 184, 253, 0.1);
        }

        /* Ocultar/Mostrar Contraseña */
        .toggle-password {
            position: absolute;
            right: 16px;
            color: #9ca3af;
            font-size: 20px;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: #4b5563;
        }

        /* Botón Ingresar */
        .btn-submit {
            width: 100%;
            height: 52px;
            background-color: #0f172a; /* Azul muy oscuro / casi negro */
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background-color: #1e293b;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* === ENLACES Y CONFIGURACIÓN EN LA TARJETA === */
        .card-bottom {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 8px;
        }

        .forgot-link {
            font-size: 13px;
            color: #39b8fd;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            text-decoration: underline;
            color: #2563eb;
        }

        .settings-icon {
            position: absolute;
            right: 0;
            color: #d1d5db;
            font-size: 22px;
            cursor: pointer;
            transition: color 0.2s, transform 0.3s;
        }

        .settings-icon:hover {
            color: #9ca3af;
            transform: rotate(45deg);
        }

        /* === FOOTER DE LA PÁGINA === */
        .page-footer {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-copyright {
            font-size: 11px;
            color: #6b7280;
            font-weight: 500;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .footer-links a {
            font-size: 11px;
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #374151;
            text-decoration: underline;
        }

        /* === RESPONSIVO === */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                gap: 20px;
            }
            body {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

<!-- CANVA DEL FONDO ANIMADO -->
<canvas id="ribbon-canvas" style="position:fixed; inset:0; z-index:0; pointer-events:none;"></canvas>

<!-- CONTENEDOR DE LA TARJETA DE LOGIN -->
<main class="login-card">
    <!-- Logo -->
    <div class="card-logo">
        <img alt="HORASOCIAL PRO Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwMhl_DdmeafGOmiL2QLqeQV_Ut8aNvKKYwKjKUtrAMBSjpyGc1Acc5TCQm084EODuuIAA3GiusiDfLdXgW3DAC8tdYPa8R-TEraz_hHglTpuTQJRtfOJfW_OyF25795_lzWR3g1wKtd_0fCPC6QxHfyblbvKAQVJNcggVB3k8TYcOAOsA0lTgC8lQz0E1YRlDIn1zQ0vALf8l_40TC_X6xkuWE-o1qr0sdsv2THdAcTxAM9txnjL8N_7oSnlqsHLnXkvvL7tImO-s">
    </div>

    <!-- Título -->
    <h1 class="card-title">Iniciar Sesión: <span>Estudiante</span></h1>

    <!-- Formulario -->
    <form class="login-form" onsubmit="handleLogin(event)">
        <!-- Usuario -->
        <div class="input-group">
            <span class="material-symbols-outlined input-icon">person</span>
            <input type="text" class="input-field" placeholder="Usuario" required autocomplete="username">
        </div>

        <!-- Contraseña -->
        <div class="input-group">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input type="password" id="password-input" class="input-field" placeholder="Contraseña" required autocomplete="current-password">
            <span class="material-symbols-outlined toggle-password" id="password-toggle" onclick="togglePassword()">visibility</span>
        </div>

        <!-- Botón Ingresar -->
        <button type="submit" class="btn-submit">INGRESAR</button>
    </form>

    <!-- Enlaces y Configuración inferior -->
    <div class="card-bottom">
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        <span class="material-symbols-outlined settings-icon">settings</span>
    </div>
</main>

<!-- FOOTER DE LA PÁGINA -->
<footer class="page-footer">
    <p class="footer-copyright">© 2026 Horasocial Pro. Professional Social Service Management.</p>
    <div class="footer-links">
        <a href="#">Privacidad</a>
        <a href="#">Soporte</a>
        <a href="#">Términos</a>
    </div>
</footer>

<script>
    // Función para mostrar / ocultar la contraseña
    function togglePassword() {
        const passwordInput = document.getElementById('password-input');
        const passwordToggle = document.getElementById('password-toggle');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            passwordToggle.textContent = 'visibility_off';
        } else {
            passwordInput.type = 'password';
            passwordToggle.textContent = 'visibility';
        }
    }

    // Evento de ejemplo para el envío del formulario
    function handleLogin(event) {
        event.preventDefault();
        // Aquí puedes colocar tu lógica de autenticación o redirección
        console.log("Intentando iniciar sesión...");
    }

    // Animación del Fondo (Ondas)
    const ctx = document.getElementById('ribbon-canvas').getContext('2d');
    let w, h, time = 0;

    function init() { 
        w = ctx.canvas.width = window.innerWidth; 
        h = ctx.canvas.height = window.innerHeight; 
    }
    window.addEventListener('resize', init); 
    init();

    function animate() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < 60; i++) {
            ctx.beginPath();
            const grad = ctx.createLinearGradient(0, 0, w, 0);
            const a = 0.12 + Math.sin(i * 0.1) * 0.05;
            
            grad.addColorStop(0, `rgba(167, 139, 250, ${a})`); 
            grad.addColorStop(0.35, `rgba(147, 197, 253, ${a})`);
            grad.addColorStop(0.65, `rgba(103, 232, 249, ${a})`); 
            grad.addColorStop(1, `rgba(94, 234, 212, ${a})`);
            
            ctx.strokeStyle = grad; 
            ctx.lineWidth = 0.8;
            
            for (let x = 0; x <= w; x += 10) {
                const nx = x / w;
                const spread = Math.sin(nx * 3.5 - time * 0.5) * (h * 0.25) + 30;
                const y = h * 0.5 + Math.sin(nx * 4 + time * 0.4) * (h * 0.15) + Math.cos(nx * 2 - time * 0.25) * (h * 0.1) + ((i/60)*2-1) * spread;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        time += 0.004; 
        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
