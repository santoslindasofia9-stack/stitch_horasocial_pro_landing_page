        @keyframes wave {
            0%, 100% {
                transform: translateY(-5%) skewX(0deg);
            }
            50% {
                transform: translateY(5%) skewX(1deg);
            }
        }
        @keyframes wave2 {
            0%, 100% {
                transform: translateY(-10%) rotate(0.5deg);
            }
            50% {
                transform: translateY(10%) rotate(-0.5deg);
            }
        }
        .bg-wave-layer1 {
            position: fixed;
            bottom: -30%;
            left: -10%;
            width: 120%;
            height: 100%;
            background: radial-gradient(circle at 100% 100%, rgb(57 184 253 / 0.15) 0%, transparent 60%);
            animation: wave 10s ease-in-out infinite;
            z-index: -1;
            transform-origin: center;
        }
        .bg-wave-layer2 {
            position: fixed;
            bottom: -50%;
            left: -10%;
            width: 120%;
            height: 100%;
            background: radial-gradient(circle at 0% 100%, rgb(57 184 253 / 0.1) 0%, transparent 70%);
            animation: wave2 12s ease-in-out infinite;
            animation-delay: -5s;
            z-index: -2;
            transform-origin: center;
        }
