<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>Mensajes - Horasocial Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "hs-primary": "#0f172a",
                        "hs-secondary": "#39b8fd",
                        "hs-accent": "#006591",
                        "hs-surface": "#f8fafc",
                        "hs-card": "#ffffff",
                        "hs-muted": "#64748b",
                        "hs-border": "#e2e8f0",
                        "hs-success": "#10b981",
                        "hs-warning": "#f59e0b",
                        "hs-error": "#ef4444",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #f8fafc 50%, #ffffff 100%);
            min-height: 100vh;
            color: #0f172a;
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            transition: font-variation-settings 0.2s ease;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* ===== SERENE BACKGROUND ===== */
        .serene-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .aurora-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: drift 25s ease-in-out infinite;
        }

        .aurora-orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(57, 184, 253, 0.3) 0%, rgba(135, 206, 250, 0.1) 50%, transparent 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
            animation-duration: 30s;
        }

        .aurora-orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.25) 0%, rgba(186, 230, 253, 0.1) 50%, transparent 70%);
            bottom: 10%;
            right: -5%;
            animation-delay: -10s;
            animation-duration: 35s;
        }

        .aurora-orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(2, 132, 199, 0.2) 0%, rgba(224, 242, 254, 0.08) 50%, transparent 70%);
            top: 40%;
            left: 30%;
            animation-delay: -20s;
            animation-duration: 28s;
        }

        .aurora-orb-4 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(186, 230, 253, 0.25) 0%, rgba(240, 249, 255, 0.1) 50%, transparent 70%);
            bottom: -5%;
            left: 20%;
            animation-delay: -5s;
            animation-duration: 32s;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 50px) scale(0.95); }
            75% { transform: translate(30px, 20px) scale(1.05); }
        }

        .wave-line {
            position: absolute;
            width: 200%;
            height: 3px;
            border-radius: 999px;
            animation: wave-flow 15s linear infinite;
        }

        .wave-line-1 {
            top: 20%;
            background: linear-gradient(90deg, transparent 0%, rgba(57, 184, 253, 0.2) 15%, rgba(57, 184, 253, 0.35) 30%, rgba(57, 184, 253, 0.45) 50%, rgba(57, 184, 253, 0.35) 70%, rgba(57, 184, 253, 0.2) 85%, transparent 100%);
            box-shadow: 0 0 12px rgba(57, 184, 253, 0.15);
            animation-delay: 0s;
        }

        .wave-line-2 {
            top: 45%;
            background: linear-gradient(90deg, transparent 0%, rgba(14, 165, 233, 0.15) 20%, rgba(14, 165, 233, 0.3) 40%, rgba(14, 165, 233, 0.4) 50%, rgba(14, 165, 233, 0.3) 60%, rgba(14, 165, 233, 0.15) 80%, transparent 100%);
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.1);
            animation-delay: -5s;
            opacity: 0.85;
        }

        .wave-line-3 {
            top: 70%;
            background: linear-gradient(90deg, transparent 0%, rgba(2, 132, 199, 0.12) 25%, rgba(2, 132, 199, 0.25) 45%, rgba(2, 132, 199, 0.35) 50%, rgba(2, 132, 199, 0.25) 55%, rgba(2, 132, 199, 0.12) 75%, transparent 100%);
            box-shadow: 0 0 8px rgba(2, 132, 199, 0.08);
            animation-delay: -10s;
            opacity: 0.7;
        }

        .wave-line-4 {
            top: 35%;
            background: linear-gradient(90deg, transparent 0%, rgba(135, 206, 250, 0.1) 20%, rgba(135, 206, 250, 0.2) 50%, rgba(135, 206, 250, 0.1) 80%, transparent 100%);
            box-shadow: 0 0 6px rgba(135, 206, 250, 0.08);
            animation-delay: -7s;
            animation-duration: 20s;
            opacity: 0.6;
        }

        .wave-line-5 {
            top: 85%;
            background: linear-gradient(90deg, transparent 0%, rgba(186, 230, 253, 0.08) 30%, rgba(186, 230, 253, 0.18) 50%, rgba(186, 230, 253, 0.08) 70%, transparent 100%);
            box-shadow: 0 0 6px rgba(186, 230, 253, 0.06);
            animation-delay: -12s;
            animation-duration: 18s;
            opacity: 0.5;
        }

        @keyframes wave-flow {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0%); }
        }

        /* ===== GLASS & UI COMPONENTS ===== */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 15px -3px rgba(15, 23, 42, 0.07), 0 10px 20px -2px rgba(15, 23, 42, 0.04);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px) saturate(150%);
            -webkit-backdrop-filter: blur(16px) saturate(150%);
            border: 1px solid rgba(226, 232, 240, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
            border-color: rgba(57, 184, 253, 0.3);
        }

        .app-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        }

        .nav-item {
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .nav-item.active {
            color: #39b8fd;
        }
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: #39b8fd;
            border-radius: 999px;
        }
        .nav-item:hover:not(.active) {
            color: #0f172a;
            transform: translateY(-2px);
        }

        /* ===== CHAT STYLES ===== */
        .view-section {
            display: none;
        }
        .view-section.active {
            display: block;
        }

        .chat-list-item {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.25s ease;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .chat-list-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -4px rgba(15, 23, 42, 0.08);
            border-color: rgba(57, 184, 253, 0.3);
        }
        .chat-list-item.active {
            background: linear-gradient(135deg, rgba(57, 184, 253, 0.08) 0%, rgba(14, 165, 233, 0.04) 100%);
            border-left: 3px solid #39b8fd;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: white;
            flex-shrink: 0;
        }

        .unread-badge {
            background: linear-gradient(135deg, #39b8fd 0%, #0ea5e9 100%);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            box-shadow: 0 2px 8px -2px rgba(57, 184, 253, 0.4);
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.3);
        }
        .online-indicator.away {
            background: #f59e0b;
            box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.3);
        }

        .chat-detail-view {
            position: fixed;
            inset: 0;
            z-index: 60;
            background: linear-gradient(135deg, #f0f9ff 0%, #f8fafc 50%, #ffffff 100%);
            display: none;
            flex-direction: column;
        }
        .chat-detail-view.active {
            display: flex;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            animation: messageSlide 0.3s ease-out forwards;
        }
        .message-bubble.sent {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            border-bottom-right-radius: 4px;
            margin-left: auto;
            box-shadow: 0 4px 12px -2px rgba(15, 23, 42, 0.2);
        }
        .message-bubble.received {
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 2px 8px -2px rgba(15, 23, 42, 0.05);
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            width: fit-content;
            box-shadow: 0 2px 8px -2px rgba(15, 23, 42, 0.05);
        }
        .typing-indicator.active { display: flex; }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #39b8fd 0%, #0ea5e9 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px -2px rgba(57, 184, 253, 0.4);
            flex-shrink: 0;
        }
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px -2px rgba(57, 184, 253, 0.5);
        }

        .chat-input {
            background: rgba(241, 245, 249, 0.8);
            border: 1.5px solid transparent;
            border-radius: 20px;
            padding: 10px 16px;
            outline: none;
            transition: all 0.2s ease;
            font-size: 14px;
            width: 100%;
        }
        .chat-input:focus {
            border-color: rgba(57, 184, 253, 0.4);
            background: white;
            box-shadow: 0 0 0 3px rgba(57, 184, 253, 0.1);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            z-index: 80;
            display: none;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-sheet {
            background: white;
            width: 100%;
            max-width: 560px;
            border-radius: 24px 24px 0 0;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 40px -10px rgba(15, 23, 42, 0.2);
        }
        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }

        .teacher-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .teacher-card:hover {
            border-color: #39b8fd;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -4px rgba(57, 184, 253, 0.15);
        }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #0f172a;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px -5px rgba(15, 23, 42, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .search-box {
            background: rgba(241, 245, 249, 0.8);
            border: 1.5px solid transparent;
            border-radius: 14px;
            transition: all 0.2s ease;
        }
        .search-box:focus-within {
            border-color: rgba(57, 184, 253, 0.4);
            background: white;
            box-shadow: 0 0 0 3px rgba(57, 184, 253, 0.1);
        }

        .animate-fade-up {
            animation: fadeUp 0.6s ease-out forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-delay-100 { animation-delay: 100ms; }
        .animate-delay-200 { animation-delay: 200ms; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }

        @media (max-width: 640px) {
            .chat-avatar { width: 44px; height: 44px; font-size: 14px; }
            .message-bubble { max-width: 85%; padding: 10px 14px; font-size: 13px; }
        }
    </style>
</head>
<body class="pb-24">

    <!-- ===== SERENE BACKGROUND ===== -->
    <div class="serene-bg">
        <div class="aurora-orb aurora-orb-1"></div>
        <div class="aurora-orb aurora-orb-2"></div>
        <div class="aurora-orb aurora-orb-3"></div>
        <div class="aurora-orb aurora-orb-4"></div>
        <div class="wave-line wave-line-1"></div>
        <div class="wave-line wave-line-2"></div>
        <div class="wave-line wave-line-3"></div>
        <div class="wave-line wave-line-4"></div>
        <div class="wave-line wave-line-5"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <span class="material-symbols-outlined text-hs-success">check_circle</span>
        <span id="toast-message">Mensaje enviado</span>
    </div>

    <!-- ===== VISTA PRINCIPAL: LISTA DE CHATS ===== -->
    <div id="view-main" class="view-section active">
        
        <!-- Header -->
        <header class="app-header fixed top-0 w-full z-50 h-16 flex items-center justify-between px-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-hs-primary to-hs-accent p-2 rounded-xl shadow-lg shadow-hs-secondary/20">
                    <span class="material-symbols-outlined text-white text-lg">school</span>
                </div>
                <div class="flex flex-col">
                    <span class="font-display font-bold text-hs-primary text-sm leading-tight">Horasocial Pro</span>
                    <span class="text-[10px] text-hs-muted font-medium tracking-wider uppercase">Estudiante</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openNotifications()" class="relative p-2.5 rounded-xl hover:bg-hs-secondary/10 transition-all active:scale-95 group">
                    <span class="material-symbols-outlined text-hs-muted group-hover:text-hs-secondary transition-colors">notifications</span>
                    <span id="header-notif-badge" class="absolute top-2 right-2 w-2.5 h-2.5 bg-hs-error rounded-full ring-2 ring-white animate-pulse hidden"></span>
                </button>
                <button onclick="openNewMessageModal()" class="bg-gradient-to-br from-hs-primary to-hs-accent text-white p-2 rounded-xl shadow-lg shadow-hs-secondary/20 hover:shadow-xl transition-all active:scale-95">
                    <span class="material-symbols-outlined text-white text-lg">edit_square</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="relative z-10 pt-20 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto space-y-6">

            <!-- Welcome -->
            <section class="animate-fade-up">
                <div class="flex items-end justify-between">
                    <div>
                        <p class="text-hs-muted text-sm font-medium mb-1">Comunícate con tus docentes</p>
                        <h1 class="font-display text-3xl sm:text-4xl font-bold text-hs-primary tracking-tight">
                            Mis <span class="text-transparent bg-clip-text bg-gradient-to-r from-hs-secondary to-hs-accent">Mensajes</span>
                        </h1>
                    </div>
                </div>
            </section>

            <!-- Search -->
            <section class="animate-fade-up animate-delay-100">
                <div class="search-box flex items-center gap-3 px-4 py-3">
                    <span class="material-symbols-outlined text-hs-muted">search</span>
                    <input id="search-input" oninput="filterChats()" type="text" placeholder="Buscar mensajes o docentes..." 
                        class="flex-1 bg-transparent outline-none text-sm text-hs-primary placeholder:text-hs-muted">
                </div>
            </section>

            <!-- Chat List -->
            <section class="animate-fade-up animate-delay-200">
                <div id="chat-list" class="space-y-3">
                    <!-- Generated by JS -->
                </div>
            </section>

        </main>
    </div>

    <!-- ===== CHAT DETAIL VIEW ===== -->
    <div id="chat-detail" class="chat-detail-view">
        <div class="app-header flex items-center gap-3 px-4 py-3">
            <button onclick="closeChat()" class="p-2 rounded-xl hover:bg-hs-secondary/10 transition-all active:scale-95">
                <span class="material-symbols-outlined text-hs-primary">arrow_back</span>
            </button>
            <div class="relative">
                <div id="detail-avatar" class="chat-avatar bg-gradient-to-br from-hs-primary to-hs-accent text-sm">JD</div>
                <div id="detail-status-dot" class="online-indicator"></div>
            </div>
            <div class="flex-1 min-w-0">
                <h3 id="detail-name" class="font-display font-bold text-hs-primary text-sm truncate">Prof. Javier Domínguez</h3>
                <p id="detail-status" class="text-xs text-hs-secondary font-medium">En línea</p>
            </div>
            <button class="p-2 rounded-xl hover:bg-hs-secondary/10 transition-all active:scale-95">
                <span class="material-symbols-outlined text-hs-muted">more_vert</span>
            </button>
        </div>

        <div id="messages-container" class="flex-1 overflow-y-auto p-4" style="background: linear-gradient(180deg, rgba(240, 249, 255, 0.3) 0%, rgba(248, 250, 252, 0.5) 100%);">
            <div id="messages-list" class="space-y-4">
                <!-- Generated by JS -->
            </div>
            <div id="typing-indicator" class="typing-indicator mt-4">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <div class="bg-white/95 backdrop-blur-xl border-t border-hs-border/60 p-3">
            <div class="flex items-end gap-3 max-w-5xl mx-auto">
                <button class="p-2 rounded-full hover:bg-hs-secondary/10 transition-all text-hs-muted">
                    <span class="material-symbols-outlined">attach_file</span>
                </button>
                <div class="flex-1">
                    <input id="message-input" type="text" placeholder="Escribe un mensaje..." 
                        class="chat-input"
                        onkeypress="handleKeyPress(event)">
                </div>
                <button onclick="sendMessage()" class="send-btn">
                    <span class="material-symbols-outlined text-white text-lg">send</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ===== NEW MESSAGE MODAL ===== -->
    <div id="new-message-modal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="p-6 pb-2">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-display font-bold text-hs-primary text-xl">Nuevo mensaje</h3>
                    <button onclick="closeNewMessageModal()" class="p-2 rounded-xl hover:bg-hs-surface transition-all">
                        <span class="material-symbols-outlined text-hs-muted">close</span>
                    </button>
                </div>
                <div class="search-box flex items-center gap-3 px-4 py-3 mb-4">
                    <span class="material-symbols-outlined text-hs-muted">search</span>
                    <input id="teacher-search" oninput="filterTeachers()" type="text" placeholder="Buscar docente..." 
                        class="flex-1 bg-transparent outline-none text-sm text-hs-primary placeholder:text-hs-muted">
                </div>
            </div>
            <div id="teachers-list" class="px-6 pb-6">
                <!-- Generated by JS -->
            </div>
        </div>
    </div>

    <!-- ===== NOTIFICATIONS PANEL ===== -->
    <div id="notifications-panel" class="fixed inset-0 z-70 bg-gradient-to-br from-[#f0f9ff] via-[#f8fafc] to-white hidden flex-col">
        <div class="app-header flex items-center gap-3 px-4 py-3">
            <button onclick="closeNotifications()" class="p-2 rounded-xl hover:bg-hs-secondary/10 transition-all active:scale-95">
                <span class="material-symbols-outlined text-hs-primary">arrow_back</span>
            </button>
            <h2 class="font-display font-bold text-hs-primary text-lg">Notificaciones</h2>
            <button onclick="markAllRead()" class="ml-auto text-xs font-semibold text-hs-secondary hover:text-hs-accent transition-colors">
                Marcar todo
            </button>
        </div>
        <div id="notifications-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- ===== BOTTOM NAVIGATION ===== -->
    <nav class="fixed bottom-0 left-0 w-full glass-panel border-t border-hs-border/50 z-50 pb-safe">
        <div class="flex justify-around items-center h-16 px-4 max-w-lg mx-auto">
            <a href="/estudiante/dashboard" class="nav-item flex flex-col items-center gap-1 py-2 px-4 text-hs-muted">
                <span class="material-symbols-outlined text-xl">dashboard</span>
                <span class="text-[10px] font-medium">Dashboard</span>
            </a>
            <a href="/estudiante/agenda" class="nav-item flex flex-col items-center gap-1 py-2 px-4 text-hs-muted">
                <span class="material-symbols-outlined text-xl">calendar_month</span>
                <span class="text-[10px] font-medium">Agenda</span>
            </a>
            <a href="/estudiante/registro" class="nav-item flex flex-col items-center gap-1 py-2 px-4 text-hs-muted">
                <span class="material-symbols-outlined text-xl">add_circle</span>
                <span class="text-[10px] font-medium">Registro</span>
            </a>
            <button class="nav-item active flex flex-col items-center gap-1 py-2 px-4">
                <span class="material-symbols-outlined text-xl filled">chat_bubble</span>
                <span class="text-[10px] font-semibold">Mensajes</span>
                <span id="nav-badge" class="absolute top-1 right-16 bg-hs-error text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold hidden">3</span>
            </button>
        </div>
    </nav>

    <script>
        // ==================== DATA ====================
        const chats = [
            {
                id: 1,
                name: "Prof. Javier Domínguez",
                initials: "JD",
                avatarColor: "from-hs-primary to-hs-accent",
                lastMessage: "Tu reporte de servicio social ha sido revisado con éxito. Revisa los comentarios adjuntos.",
                time: "10:45 AM",
                unread: 2,
                isActive: true,
                status: "En línea",
                statusType: "online",
                messages: [
                    { id: 1, type: "received", text: "Hola, he revisado tu reporte de servicio social.", time: "10:30 AM", read: true },
                    { id: 2, type: "received", text: "El contenido está muy bien estructurado. Solo necesitas corregir la fecha de inicio en la página 3.", time: "10:32 AM", read: true },
                    { id: 3, type: "sent", text: "Gracias profesor, voy a revisarlo ahora mismo.", time: "10:35 AM", read: true },
                    { id: 4, type: "received", text: "Tu reporte de servicio social ha sido revisado con éxito. Revisa los comentarios adjuntos.", time: "10:45 AM", read: false }
                ]
            },
            {
                id: 2,
                name: "Dra. Ana Martínez",
                initials: "AM",
                avatarColor: "from-purple-600 to-violet-600",
                lastMessage: "Recuerda entregar la carta de liberación el viernes antes de las 2 PM.",
                time: "Ayer",
                unread: 0,
                isActive: false,
                status: "Hace 2 horas",
                statusType: "away",
                messages: [
                    { id: 1, type: "received", text: "Buenas tardes, ¿cómo va tu servicio social?", time: "Ayer 3:00 PM", read: true },
                    { id: 2, type: "sent", text: "Va muy bien doctora, estoy aprendiendo mucho.", time: "Ayer 3:15 PM", read: true },
                    { id: 3, type: "received", text: "Recuerda entregar la carta de liberación el viernes antes de las 2 PM.", time: "Ayer 4:00 PM", read: true }
                ]
            },
            {
                id: 3,
                name: "Lic. Ricardo Castro",
                initials: "RC",
                avatarColor: "from-emerald-600 to-teal-600",
                lastMessage: "Se ha habilitado la nueva convocatoria para el DIF. ¿Te interesa?",
                time: "Lun",
                unread: 1,
                isActive: false,
                status: "En línea",
                statusType: "online",
                messages: [
                    { id: 1, type: "received", text: "Hola, tengo información sobre una nueva oportunidad.", time: "Lun 9:00 AM", read: true },
                    { id: 2, type: "received", text: "Se ha habilitado la nueva convocatoria para el DIF. ¿Te interesa?", time: "Lun 9:05 AM", read: false }
                ]
            },
            {
                id: 4,
                name: "Servicios Generales",
                initials: "SG",
                avatarColor: "from-sky-600 to-blue-600",
                lastMessage: "Confirmamos la recepción de tu firma digital. El proceso está completo.",
                time: "12 Oct",
                unread: 0,
                isActive: false,
                status: "Sistema",
                statusType: "bot",
                messages: [
                    { id: 1, type: "received", text: "Hemos recibido tu documento de firma digital.", time: "12 Oct 10:00 AM", read: true },
                    { id: 2, type: "received", text: "Confirmamos la recepción de tu firma digital. El proceso está completo.", time: "12 Oct 10:05 AM", read: true }
                ]
            },
            {
                id: 5,
                name: "Laura Caballero",
                initials: "LC",
                avatarColor: "from-rose-500 to-pink-600",
                lastMessage: "Hola, ¿ya tienes el formato de horas acumuladas? Te lo puedo enviar.",
                time: "10 Oct",
                unread: 0,
                isActive: false,
                status: "Hace 5 min",
                statusType: "online",
                messages: [
                    { id: 1, type: "received", text: "Hola, ¿cómo estás?", time: "10 Oct 11:00 AM", read: true },
                    { id: 2, type: "sent", text: "Bien, gracias. ¿Y tú?", time: "10 Oct 11:05 AM", read: true },
                    { id: 3, type: "received", text: "Hola, ¿ya tienes el formato de horas acumuladas? Te lo puedo enviar.", time: "10 Oct 11:30 AM", read: true }
                ]
            }
        ];

        const teachers = [
            { id: 6, name: "Prof. Carlos Mendoza", subject: "Servicio Social", initials: "CM", avatarColor: "from-amber-600 to-orange-600" },
            { id: 7, name: "Dra. Patricia López", subject: "Prácticas Profesionales", initials: "PL", avatarColor: "from-indigo-600 to-purple-600" },
            { id: 8, name: "Lic. Fernando Ruiz", subject: "Vinculación", initials: "FR", avatarColor: "from-cyan-600 to-sky-600" },
            { id: 9, name: "Mtra. Gabriela Soto", subject: "Servicio Social", initials: "GS", avatarColor: "from-fuchsia-600 to-pink-600" }
        ];

        const notifications = [
            { id: 1, title: "Nuevo reporte revisado", message: "Prof. Domínguez ha revisado tu reporte", time: "Hace 10 min", read: false, type: "message", chatId: 1 },
            { id: 2, title: "Recordatorio importante", message: "Entrega de carta de liberación este viernes", time: "Hace 2 horas", read: false, type: "alert" },
            { id: 3, title: "Convocatoria abierta", message: "Nueva oportunidad en el DIF disponible", time: "Hace 1 día", read: true, type: "info", chatId: 3 },
            { id: 4, title: "Firma confirmada", message: "Tu firma digital ha sido procesada", time: "Hace 3 días", read: true, type: "success" }
        ];

        let currentChatId = null;

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            renderChatList();
            updateBadge();
            renderNotifications();
            renderTeachersList();
        });

        // ==================== CHAT LIST ====================
        function renderChatList() {
            const container = document.getElementById('chat-list');
            const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';
            
            const filtered = chats.filter(chat => 
                chat.name.toLowerCase().includes(searchTerm) || 
                chat.lastMessage.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="w-16 h-16 rounded-full bg-hs-secondary/10 flex items-center justify-center mx-auto mb-4">
                            <span class="material-symbols-outlined text-hs-secondary text-2xl">search_off</span>
                        </div>
                        <p class="text-hs-muted font-medium">No se encontraron chats</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(chat => `
                <div onclick="openChat(${chat.id})" 
                     class="chat-list-item flex items-center gap-4 ${chat.isActive ? 'active' : ''}">
                    <div class="relative">
                        <div class="chat-avatar bg-gradient-to-br ${chat.avatarColor}">${chat.initials}</div>
                        ${chat.statusType === 'online' ? `<div class="online-indicator"></div>` : ''}
                        ${chat.statusType === 'away' ? `<div class="online-indicator away"></div>` : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-display font-bold text-sm text-hs-primary truncate">${chat.name}</h3>
                            <span class="text-[11px] ${chat.unread > 0 ? 'text-hs-secondary font-bold' : 'text-hs-muted'} whitespace-nowrap ml-2">${chat.time}</span>
                        </div>
                        <p class="text-[13px] ${chat.unread > 0 ? 'text-hs-primary font-medium' : 'text-hs-muted'} truncate leading-relaxed">${chat.lastMessage}</p>
                    </div>
                    ${chat.unread > 0 ? `<span class="unread-badge">${chat.unread}</span>` : ''}
                </div>
            `).join('');
        }

        function filterChats() {
            renderChatList();
        }

        // ==================== CHAT DETAIL ====================
        function openChat(chatId) {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            
            chat.unread = 0;
            chat.isActive = true;
            chats.forEach(c => { if (c.id !== chatId) c.isActive = false; });
            
            document.getElementById('detail-name').textContent = chat.name;
            document.getElementById('detail-status').textContent = chat.status;
            document.getElementById('detail-avatar').textContent = chat.initials;
            document.getElementById('detail-avatar').className = `chat-avatar bg-gradient-to-br ${chat.avatarColor} text-sm`;
            
            const statusDot = document.getElementById('detail-status-dot');
            statusDot.style.display = 'block';
            statusDot.className = 'online-indicator';
            if (chat.statusType === 'away') statusDot.classList.add('away');
            else if (chat.statusType === 'bot') statusDot.style.display = 'none';
            
            renderMessages();
            updateBadge();
            renderChatList();
            
            document.getElementById('chat-detail').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            setTimeout(() => {
                scrollToBottom();
                document.getElementById('message-input').focus();
            }, 100);
        }

        function renderMessages() {
            const chat = chats.find(c => c.id === currentChatId);
            const container = document.getElementById('messages-list');
            
            if (chat.messages.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="w-16 h-16 rounded-full bg-hs-secondary/10 flex items-center justify-center mx-auto mb-4">
                            <span class="material-symbols-outlined text-hs-secondary text-2xl">chat</span>
                        </div>
                        <p class="text-hs-muted font-medium">Inicia una conversación</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = chat.messages.map(msg => `
                <div class="flex ${msg.type === 'sent' ? 'justify-end' : 'justify-start'}">
                    <div class="message-bubble ${msg.type}">
                        <p>${msg.text}</p>
                        <div class="message-time ${msg.type === 'sent' ? 'text-white/70' : 'text-hs-muted'}">
                            <span>${msg.time}</span>
                            ${msg.type === 'sent' ? `<span class="material-symbols-outlined text-[14px]">${msg.read ? 'done_all' : 'check'}</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function closeChat() {
            document.getElementById('chat-detail').classList.remove('active');
            document.body.style.overflow = '';
            currentChatId = null;
            renderChatList();
        }

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            if (container) container.scrollTop = container.scrollHeight;
        }

        // ==================== SEND MESSAGE ====================
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentChatId) return;
            
            const chat = chats.find(c => c.id === currentChatId);
            const timeStr = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
            
            chat.messages.push({
                id: Date.now(),
                type: "sent",
                text: text,
                time: timeStr,
                read: false
            });
            
            chat.lastMessage = text;
            chat.time = timeStr;
            
            input.value = '';
            renderMessages();
            scrollToBottom();
            showToast('Mensaje enviado');
            
            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    const responses = [
                        "Entendido, gracias por la información.",
                        "Voy a revisarlo y te confirmo.",
                        "Perfecto, quedo al pendiente.",
                        "Gracias, cualquier duda me avisas."
                    ];
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    
                    chat.messages.push({
                        id: Date.now() + 1,
                        type: "received",
                        text: randomResponse,
                        time: new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }),
                        read: true
                    });
                    
                    chat.lastMessage = randomResponse;
                    chat.time = "Ahora";
                    chat.unread = 1;
                    
                    renderMessages();
                    scrollToBottom();
                    renderChatList();
                    updateBadge();
                    showToast(`Nuevo mensaje de ${chat.name}`);
                }, 2000);
            }, 1000);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function showTyping() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.classList.add('active');
            scrollToBottom();
        }

        function hideTyping() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.classList.remove('active');
        }

        // ==================== NOTIFICATIONS ====================
        function openNotifications() {
            document.getElementById('notifications-panel').classList.remove('hidden');
            document.getElementById('notifications-panel').classList.add('flex');
            document.body.style.overflow = 'hidden';
            document.getElementById('header-notif-badge').classList.add('hidden');
        }

        function closeNotifications() {
            document.getElementById('notifications-panel').classList.add('hidden');
            document.getElementById('notifications-panel').classList.remove('flex');
            document.body.style.overflow = '';
        }

        function renderNotifications() {
            const container = document.getElementById('notifications-list');
            
            if (notifications.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="w-16 h-16 rounded-full bg-hs-secondary/10 flex items-center justify-center mx-auto mb-4">
                            <span class="material-symbols-outlined text-hs-secondary text-2xl">notifications_off</span>
                        </div>
                        <p class="text-hs-muted font-medium">Sin notificaciones</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = notifications.map(notif => {
                const typeConfig = {
                    message: { icon: 'chat', bg: 'bg-sky-50', text: 'text-sky-700' },
                    alert: { icon: 'warning', bg: 'bg-amber-50', text: 'text-amber-700' },
                    info: { icon: 'info', bg: 'bg-blue-50', text: 'text-blue-700' },
                    success: { icon: 'check_circle', bg: 'bg-emerald-50', text: 'text-emerald-700' }
                };
                const config = typeConfig[notif.type] || typeConfig.info;
                
                return `
                    <div onclick="handleNotificationClick(${notif.id})" 
                         class="notif-item ${!notif.read ? 'unread' : ''}">
                        <div class="flex items-start gap-3">
                            <div class="w-10 h-10 rounded-xl ${config.bg} flex items-center justify-center flex-shrink-0">
                                <span class="material-symbols-outlined ${config.text}">${config.icon}</span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start">
                                    <h4 class="font-display font-bold text-sm text-hs-primary">${notif.title}</h4>
                                    <span class="text-[10px] text-hs-muted whitespace-nowrap ml-2">${notif.time}</span>
                                </div>
                                <p class="text-[13px] text-hs-muted mt-1 leading-relaxed">${notif.message}</p>
                            </div>
                            ${!notif.read ? `<div class="w-2 h-2 bg-hs-secondary rounded-full mt-2 flex-shrink-0"></div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function markAllRead() {
            notifications.forEach(n => n.read = true);
            renderNotifications();
            updateBadge();
            showToast('Todas las notificaciones leídas');
        }

        function handleNotificationClick(id) {
            const notif = notifications.find(n => n.id === id);
            if (notif) {
                notif.read = true;
                renderNotifications();
                updateBadge();
                
                if (notif.chatId) {
                    closeNotifications();
                    setTimeout(() => openChat(notif.chatId), 300);
                }
            }
        }

        // ==================== NEW MESSAGE ====================
        function openNewMessageModal() {
            document.getElementById('new-message-modal').classList.add('active');
            document.getElementById('teacher-search').focus();
        }

        function closeNewMessageModal() {
            document.getElementById('new-message-modal').classList.remove('active');
            document.getElementById('teacher-search').value = '';
            renderTeachersList();
        }

        function renderTeachersList() {
            const searchTerm = document.getElementById('teacher-search')?.value.toLowerCase() || '';
            const container = document.getElementById('teachers-list');
            if (!container) return;
            
            const filtered = teachers.filter(t => 
                t.name.toLowerCase().includes(searchTerm) || 
                t.subject.toLowerCase().includes(searchTerm)
            );
            
            container.innerHTML = filtered.map(teacher => `
                <div onclick="startNewChat(${teacher.id})" class="teacher-card">
                    <div class="chat-avatar bg-gradient-to-br ${teacher.avatarColor} text-sm">${teacher.initials}</div>
                    <div class="flex-1">
                        <h4 class="font-display font-bold text-sm text-hs-primary">${teacher.name}</h4>
                        <p class="text-xs text-hs-muted">${teacher.subject}</p>
                    </div>
                    <span class="material-symbols-outlined text-hs-muted text-sm">chevron_right</span>
                </div>
            `).join('');
        }

        function filterTeachers() {
            renderTeachersList();
        }

        function startNewChat(teacherId) {
            const teacher = teachers.find(t => t.id === teacherId);
            let chat = chats.find(c => c.name === teacher.name);
            
            if (!chat) {
                chat = {
                    id: teacher.id,
                    name: teacher.name,
                    initials: teacher.initials,
                    avatarColor: teacher.avatarColor,
                    lastMessage: "Inicia una conversación...",
                    time: "Ahora",
                    unread: 0,
                    isActive: false,
                    status: "En línea",
                    statusType: "online",
                    messages: []
                };
                chats.unshift(chat);
            }
            
            closeNewMessageModal();
            openChat(chat.id);
            showToast(`Chat iniciado con ${teacher.name}`);
        }

        function closeModalOnOverlay(event) {
            if (event.target === event.currentTarget) closeNewMessageModal();
        }

        // ==================== UTILITIES ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-message');
            if (!toast || !msgEl) return;
            msgEl.textContent = message;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        function updateBadge() {
            const totalUnread = chats.reduce((sum, chat) => sum + chat.unread, 0);
            const badge = document.getElementById('nav-badge');
            if (!badge) return;
            if (totalUnread > 0) {
                badge.textContent = totalUnread;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // Close on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeNewMessageModal();
                closeChat();
                closeNotifications();
            }
        });

        // Scroll header shadow
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.app-header').forEach(header => {
                if (window.pageYOffset > 50) {
                    header.style.boxShadow = '0 4px 20px -2px rgba(15, 23, 42, 0.08)';
                } else {
                    header.style.boxShadow = 'none';
                }
            });
        });
    </script>
</body>
