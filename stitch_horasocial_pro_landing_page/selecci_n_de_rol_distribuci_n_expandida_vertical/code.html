<!-- Top section: Logo and Slogan -->
<header class="w-full flex flex-col items-center pt-xl">
<div class="bg-transparent mb-6">

<button class="group flex flex-col aspect-square bg-white rounded-xl shadow-md border border-surface-variant/20 transition-all duration-300 active:scale-95 items-center justify-center p-2 text-center">

</div>

</div>
