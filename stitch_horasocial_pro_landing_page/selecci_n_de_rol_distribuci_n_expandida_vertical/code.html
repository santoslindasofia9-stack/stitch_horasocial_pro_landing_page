<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HORASOCIAL PRO - Selección de Rol</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #fafbfc;
            font-family: 'Inter', sans-serif;
            color: #191c1e;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; }

        .content-wrapper {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; padding: 40px 24px; gap: 36px;
        }

        .header-logo {
            display: flex; align-items: center; justify-content: center;
            width: 100%; max-width: 300px;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .logo-img {
            width: 100%; max-width: 220px;
            border: 3px solid #000; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: transform 0.5s;
        }
        .header-logo:hover .logo-img { transform: scale(1.05); }

        .text-block { text-align: center; max-width: 480px; margin-top: -8px; }
        .text-block h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 28px; color: #0c2340; line-height: 1.25; margin-bottom: 8px; }
        .text-block p { font-size: 15px; color: #5a6370; line-height: 1.5; }

        .roles-grid {
            display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 520px; margin-top: 10px;
        }
        .role-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: #191c1e;
            width: 140px;
            height: 140px;
        }
        
        .role-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 28px rgba(12, 35, 64, 0.12);
            border-color: rgba(57, 184, 253, 0.4);
        }
        .role-card:active {
            transform: translateY(0) scale(0.98);
        }

        .role-icon-wrapper {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .role-card:hover .role-icon-wrapper { transform: scale(1.08); }

        .role-icon-wrapper.estudiante { background: #34bcfb; }
        .role-icon-wrapper.profesor { background: #006591; }
        .role-icon-wrapper.admin { background: #0f172a; }
        
        .role-icon-wrapper .material-symbols-outlined { color: white; font-size: 30px; transition: opacity 0.2s; }
        
        .role-info { text-align: center; }
        .role-info h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 700; margin: 0; }
        .role-info p { display: none; }

        .footer-info { text-align: center; padding-bottom: 24px; position: relative; z-index: 2; }
        .footer-info p { font-size: 13px; color: #5a6370; margin-bottom: 6px; }
        .footer-info a { color: #006591; text-decoration: none; font-weight: 600; }
        .footer-info a:hover { text-decoration: underline; }
        
        .footer-bottom { margin-top: 12px; }
        .footer-bottom span { font-size: 11px; font-weight: 600; color: #9ca3af; letter-spacing: 0.04em; }
        .footer-line { width: 40px; height: 3px; background: #d1d5db; border-radius: 9999px; margin: 5px auto 0; opacity: 0.5; }

        @media (max-width: 520px) {
            .roles-grid { gap: 16px; }
            .role-card { width: 140px; height: 140px; }
        }
        @media (max-width: 380px) {
            .role-card { width: 120px; height: 120px; padding: 16px 12px; gap: 12px; }
            .role-icon-wrapper { width: 50px; height: 50px; }
            .role-icon-wrapper .material-symbols-outlined { font-size: 26px; }
            .role-info h3 { font-size: 14px; }
        }
        @media (max-height: 700px) {
            .content-wrapper { gap: 24px; padding: 20px; }
            .logo-img { max-width: 160px; }
            .text-block h1 { font-size: 24px; }
            .role-card { height: 120px; gap: 10px; }
            .role-icon-wrapper { width: 44px; height: 44px; }
            .role-icon-wrapper .material-symbols-outlined { font-size: 24px; }
        }
    </style>
</head>
<body>

<canvas id="ribbon-canvas" style="position:fixed; inset:0; z-index:0; pointer-events:none;"></canvas>

<div class="content-wrapper">
    <header class="header-logo">
        <img alt="HORASOCIAL PRO Logo Pequeño" class="logo-img" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwMhl_DdmeafGOmiL2QLqeQV_Ut8aNvKKYwKjKUtrAMBSjpyGc1Acc5TCQm084EODuuIAA3GiusiDfLdXgW3DAC8tdYPa8R-TEraz_hHglTpuTQJRtfOJfW_OyF25795_lzWR3g1wKtd_0fCPC6QxHfyblbvKAQVJNcggVB3k8TYcOAOsA0lTgC8lQz0E1YRlDIn1zQ0vALf8l_40TC_X6xkuWE-o1qr0sdsv2THdAcTxAM9txnjL8N_7oSnlqsHLnXkvvL7tImO-s">
    </header>

    <div class="text-block">
        <h1>Elige cómo quieres ingresar</h1>
        <p>Selecciona tu rol para acceder a las herramientas correspondientes a tu perfil.</p>
    </div>

    <div class="roles-grid">
        <button class="role-card" onclick="selectRole('estudiante', this)">
            <div class="role-icon-wrapper estudiante">
                <span class="material-symbols-outlined">school</span>
            </div>
            <div class="role-info">
                <h3>Estudiante</h3>
                <p>Registra tus horas</p>
            </div>
        </button>

        <button class="role-card" onclick="selectRole('profesor', this)">
            <div class="role-icon-wrapper profesor">
                <span class="material-symbols-outlined">group</span>
            </div>
            <div class="role-info">
                <h3>Profesor</h3>
                <p>Supervisa a tus alumnos</p>
            </div>
        </button>

        <button class="role-card" onclick="selectRole('admin', this)">
            <div class="role-icon-wrapper admin">
                <span class="material-symbols-outlined">verified_user</span>
            </div>
            <div class="role-info">
                <h3>Administrador</h3>
                <p>Gestiona la plataforma</p>
            </div>
        </button>
    </div>

</div>

<div class="footer-info">
    <p>¿Necesitas ayuda? <a href="#">Consulta nuestra guía de acceso</a></p>
    <div class="footer-bottom">
        <span>© 2026 HORASOCIAL PRO</span>
        <div class="footer-line"></div>
    </div>
</div>

<script>
    function selectRole(role, btnElement) {
        console.log("Rol seleccionado: " + role);
        
        const icon = btnElement.querySelector('.material-symbols-outlined');
        icon.style.opacity = '0';
        setTimeout(() => {
            icon.innerText = 'progress_activity';
            icon.style.animation = 'spin 0.8s linear infinite';
            icon.style.opacity = '1';
        }, 150);
        
        document.querySelectorAll('.role-card').forEach(btn => btn.disabled = true);
        
        setTimeout(() => {
            if (role === 'estudiante') {
                window.location.href = '/login';
            } else if (role === 'profesor') {
                window.location.href = '/profesor/login';
            } else if (role === 'admin') {
                window.location.href = '/login_administrador';  // ✅ CORREGIDO: Va al login, NO al dashboard
            }
        }, 800);
    }

    const ctx = document.getElementById('ribbon-canvas').getContext('2d');
    let w, h, time = 0;

    function init() { w = ctx.canvas.width = window.innerWidth; h = ctx.canvas.height = window.innerHeight; }
    window.addEventListener('resize', init); init();

    function animate() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < 60; i++) {
            ctx.beginPath();
            const grad = ctx.createLinearGradient(0, 0, w, 0), a = 0.12 + Math.sin(i * 0.1) * 0.05;
            grad.addColorStop(0, `rgba(167, 139, 250, ${a})`); grad.addColorStop(0.35, `rgba(147, 197, 253, ${a})`);
            grad.addColorStop(0.65, `rgba(103, 232, 249, ${a})`); grad.addColorStop(1, `rgba(94, 234, 212, ${a})`);
            ctx.strokeStyle = grad; ctx.lineWidth = 0.8;
            
            for (let x = 0; x <= w; x += 10) {
                const nx = x / w;
                const spread = Math.sin(nx * 3.5 - time * 0.5) * (h * 0.25) + 30;
                const y = h * 0.5 + Math.sin(nx * 4 + time * 0.4) * (h * 0.15) + Math.cos(nx * 2 - time * 0.25) * (h * 0.1) + ((i/60)*2-1) * spread;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        time += 0.004; requestAnimationFrame(animate);
    }
    animate();
</script>

<style>
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>

</body>
</html>
